<!-- @dsCard group="Colors" name="Neutral palette" subtitle="Warm near-black to soft white reading canvas" viewport="700x230" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="_base.css" />
<style>
  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { border-radius: var(--radius-card); overflow: hidden; border: 1px solid var(--color-border); }
  .sw .chip { height: 80px; }
  .sw .meta { padding: 10px 12px; background: var(--color-surface); }
  .sw .name { font-weight: 600; font-size: 13px; color: var(--color-heading); }
  .sw .hex { font-family: var(--font-mono); font-size: 12px; color: var(--color-secondary); margin-top: 2px; }
  .sw .role { font-size: 11px; color: var(--color-secondary); margin-top: 5px; line-height: 1.35; }
</style>
</head>
<body>
<div class="card">
  <div class="card-label">Neutral palette</div>
  <div class="swatches">
    <div class="sw">
      <div class="chip" style="background:#1C1714"></div>
      <div class="meta"><div class="name">Document Black</div><div class="hex">#1C1714</div>
        <div class="role">Body text on light</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#F6F5F1"></div>
      <div class="meta"><div class="name">Soft White</div><div class="hex">#F6F5F1</div>
        <div class="role">Primary background</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#E0E6ED"></div>
      <div class="meta"><div class="name">Cool Gray</div><div class="hex">#E0E6ED</div>
        <div class="role">Borders, dividers</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#808A9B"></div>
      <div class="meta"><div class="name">Accent Gray</div><div class="hex">#808A9B</div>
        <div class="role">Secondary text, captions</div></div>
    </div>
  </div>
</div>
</body>
</html>
