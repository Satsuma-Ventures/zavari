<!-- @dsCard group="Colors" name="Brand palette" subtitle="Navy · Cyan · Azure — the brand triad" viewport="700x250" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="_base.css" />
<style>
  .swatches { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .sw { border-radius: var(--radius-card); overflow: hidden; border: 1px solid var(--color-border); }
  .sw .chip { height: 96px; }
  .sw .meta { padding: 12px 14px; background: var(--color-surface); }
  .sw .name { font-weight: 600; font-size: 14px; color: var(--color-heading); }
  .sw .hex { font-family: var(--font-mono); font-size: 13px; color: var(--color-secondary); margin-top: 2px; }
  .sw .role { font-size: 12px; color: var(--color-secondary); margin-top: 6px; line-height: 1.4; }
</style>
</head>
<body>
<div class="card">
  <div class="card-label">Brand palette · 60–70% Navy weight, Cyan sparing</div>
  <div class="swatches">
    <div class="sw">
      <div class="chip" style="background:#0A1F44"></div>
      <div class="meta"><div class="name">Navy</div><div class="hex">#0A1F44</div>
        <div class="role">Structure, dark surfaces, headings on light</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#00D4FF"></div>
      <div class="meta"><div class="name">Cyan</div><div class="hex">#00D4FF</div>
        <div class="role">Expressive accent — graphic only, never type on light</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:#0099FF"></div>
      <div class="meta"><div class="name">Azure</div><div class="hex">#0099FF</div>
        <div class="role">Functional accent — links, interactive states</div></div>
    </div>
  </div>
</div>
</body>
</html>
