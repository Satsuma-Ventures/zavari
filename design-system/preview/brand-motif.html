<!-- @dsCard group="Brand" name="Triangulation motif" subtitle="Three signals resolving to one point" viewport="700x230" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="_base.css" />
<style>
  .frame { background: var(--gradient-navy); border-radius: var(--radius-card); padding: 28px 32px; display: flex; align-items: center; gap: 28px; }
  .frame .txt { color: var(--zv-cool-gray); font-size: 13px; line-height: 1.55; max-width: 320px; }
  .frame .txt strong { color: #fff; font-weight: 600; display:block; font-family: var(--font-serif); font-size: 17px; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="card">
  <div class="card-label">Visual motif · abstract signal, never a GPS pin</div>
  <div class="frame">
    <svg width="120" height="120" viewBox="0 0 120 120" fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round">
      <line x1="10" y1="24" x2="104" y2="60" opacity="0.55" />
      <line x1="10" y1="60" x2="104" y2="60" opacity="0.8" />
      <line x1="10" y1="96" x2="104" y2="60" opacity="0.55" />
      <circle cx="104" cy="60" r="4" fill="#00D4FF" stroke="none" />
    </svg>
    <div class="txt"><strong>Three signals, one point of clarity</strong>
      Qualitative, quantitative, and market signal converge. Used as subtle depth on Navy heroes and as a structural diagram element — abstract, never literal.</div>
  </div>
</div>
</body>
</html>
