<!-- @dsCard group="Brand" name="Logo lockups" subtitle="Stacked, horizontal & icon — use as-is" viewport="700x440" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="_base.css" />
<style>
  .grid { display: grid; grid-template-columns: 1.3fr 1.3fr 0.8fr; gap: 16px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
  .frame { border-radius: var(--radius-card); border: 1px solid var(--color-border); padding: 24px; display: flex; align-items: center; justify-content: center; min-height: 120px; }
  .frame.dark { background: var(--zv-navy); border-color: transparent; }
  .frame img { max-width: 100%; max-height: 84px; }
  .frame.wide img { max-height: 52px; }
  .cap { font-size: 11px; color: var(--color-secondary); margin-top: 8px; text-align: center; }
  .sub { font-family: var(--font-sans); font-weight: 600; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-secondary); margin: 22px 0 12px; }
</style>
</head>
<body>
<div class="card">
  <div class="card-label">Logo · never redraw, recolor, or invert</div>
  <div class="sub" style="margin-top:0">Stacked &amp; icon</div>
  <div class="grid">
    <div>
      <div class="frame" style="background:var(--zv-soft-white)"><img src="../assets/zavari-logo-ltbg.svg" alt="Zavari stacked logo, navy on light" /></div>
      <div class="cap">Light surfaces</div>
    </div>
    <div>
      <div class="frame dark"><img src="../assets/zavari-logo-dkbg.svg" alt="Zavari stacked logo, white on navy" /></div>
      <div class="cap">Navy surfaces</div>
    </div>
    <div>
      <div class="frame dark"><img src="../assets/zavari-icon.svg" alt="Zavari icon" /></div>
      <div class="cap">Icon · below 120px</div>
    </div>
  </div>
  <div class="sub">Horizontal</div>
  <div class="grid2">
    <div>
      <div class="frame wide" style="background:var(--zv-soft-white)"><img src="../assets/zavari-logo-horizontal-ltbg.svg" alt="Zavari horizontal logo, navy on light" /></div>
      <div class="cap">Light surfaces</div>
    </div>
    <div>
      <div class="frame wide dark"><img src="../assets/zavari-logo-horizontal-dkbg.svg" alt="Zavari horizontal logo, white on navy" /></div>
      <div class="cap">Navy surfaces</div>
    </div>
  </div>
</div>
</body>
</html>
