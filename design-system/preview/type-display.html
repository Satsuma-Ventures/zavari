<!-- @dsCard group="Type" name="Display & stat — IBM Plex Serif" subtitle="Headings, display & the stat figure" viewport="700x400" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="_base.css" />
<style>
  .spec { color: var(--color-heading); font-family: var(--font-serif); }
  .d1 { font-size: 40px; font-weight: 600; line-height: 1.15; letter-spacing: -0.01em; }
  .d2 { font-size: 30px; font-weight: 600; line-height: 1.2; margin-top: 14px; }
  .d3 { font-size: 22px; font-weight: 500; line-height: 1.3; margin-top: 14px; }
  .dstat { font-family: var(--font-serif); font-weight: 500; font-size: 56px; line-height: 1; letter-spacing: -0.01em; margin-top: 26px; }
  .dstat .su { font-family: var(--font-sans); font-weight: 600; font-size: 24px; margin-left: 6px; }
  .dstat .dl { font-family: var(--font-mono); font-size: 14px; color: var(--color-secondary); display: block; margin-top: 8px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--color-secondary); display:block; margin-top:4px; }
</style>
</head>
<body>
<div class="card">
  <div class="card-label">Display · IBM Plex Serif</div>
  <div class="spec">
    <div class="d1">Strategic coherence, made legible
      <span class="tag">H1 / Display — Serif SemiBold · 40px</span></div>
    <div class="d2">Where the bets stop laddering
      <span class="tag">H2 — Serif SemiBold · 30px</span></div>
    <div class="d3">Second-order consequences
      <span class="tag">H3 — Serif Medium · 22px</span></div>
    <div class="dstat">2.4<span class="su">M</span>
      <span class="dl">Addressable accounts · Data Label (Mono)</span>
      <span class="tag">Stat Callout — Serif Medium · 56px</span></div>
  </div>
</div>
</body>
</html>
