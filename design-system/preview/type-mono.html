<!-- @dsCard group="Type" name="Data — IBM Plex Mono" subtitle="Data labels, code & metadata" viewport="700x240" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="_base.css" />
<style>
  .dlabel { font-family: var(--font-mono); font-size: 16px; color: var(--color-heading); }
  .metrics { font-family: var(--font-mono); font-size: 16px; color: var(--color-ink); margin-top: 14px; display: flex; gap: 22px; }
  .metrics .k { color: var(--color-secondary); }
  .code { font-family: var(--font-mono); font-size: 14px; color: var(--color-ink); margin-top: 18px; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 4px; padding: 8px 12px; display: inline-block; }
  .meta { font-family: var(--font-mono); font-size: 12px; color: var(--color-secondary); margin-top: 18px; }
  .note { font-size: 12px; color: var(--color-secondary); margin-top: 16px; line-height: 1.5; }
</style>
</head>
<body>
<div class="card">
  <div class="card-label">Data · IBM Plex Mono</div>
  <div class="dlabel">Addressable accounts · Data Label 16px</div>
  <div class="metrics"><span><span class="k">ACV</span> $48,200</span><span><span class="k">MRR</span> $312K</span><span><span class="k">Coherence</span> 0.94</span></div>
  <div class="code">engine.coherence(bet_id="north-star") → 0.94</div>
  <div class="meta">Source: Amplitude · synced 6h ago · Caption 12px</div>
  <div class="note">Mono is reserved for data labels, metric values, code, and source / metadata captions — precision, not prose.</div>
</div>
</body>
</html>
